        <h1 class="text-5xl md:text-6xl font-bold mb-6 glow-text">My Projects</h1>

<!-- Snake Game -->
<section class="py-16">
<div class="max-w-6xl mx-auto px-4">
<div class="text-center mb-12">
<h2 class="text-4xl font-bold mb-4 gradient-text">Snake Game</h2>
<p class="text-lg text-gray-300">Classic snake game built with JavaScript and HTML5 Canvas</p>
</div>

<div class="game-container rounded-xl p-8">
<div class="flex flex-col lg:flex-row gap-8 items-center justify-center">

<div class="text-center">
<canvas id="snake-game" width="400" height="400"></canvas>
<div class="mt-4 flex justify-between items-center">
<div class="text-2xl font-bold">
Score: <span id="score" class="gradient-text">0</span>
</div>
<div class="text-sm text-gray-400">
Arrow Keys / WASD — Space = Restart
</div>
</div>
</div>

<div class="space-y-6">
<div class="text-center">
<button id="restartBtn"
class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors">
Restart Game
</button>
</div>
</div>

</div>
</div>
</div>
</section>

<!-- Footer -->
<footer class="bg-gray-900 border-t border-gray-800 py-8">
<div class="max-w-7xl mx-auto px-4 text-center">
<p class="text-gray-400 code-font">
© 2025 EK Development. All rights reserved.
</p>
</div>
</footer>

<script>
const canvas = document.getElementById("snake-game");
const ctx = canvas.getContext("2d");
const box = 20;
let snake, direction, food, score, game;

function initGame() {
    snake = [{x: 9 * box, y: 10 * box}];
    direction = null;
    score = 0;
    document.getElementById("score").textContent = score;
    food = {
        x: Math.floor(Math.random() * 19) * box,
        y: Math.floor(Math.random() * 19) * box
    };
    if (game) clearInterval(game);
    game = setInterval(draw, 120);
}

function draw() {
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0, 0, 400, 400);

    for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "#8b5cf6" : "#a78bfa";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }

    ctx.fillStyle = "#06b6d4";
    ctx.fillRect(food.x, food.y, box, box);

    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if (direction === "LEFT") snakeX -= box;
    if (direction === "UP") snakeY -= box;
    if (direction === "RIGHT") snakeX += box;
    if (direction === "DOWN") snakeY += box;

    if (snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById("score").textContent = score;
        food = {
            x: Math.floor(Math.random() * 19) * box,
            y: Math.floor(Math.random() * 19) * box
        };
    } else {
        snake.pop();
    }

    const newHead = {x: snakeX, y: snakeY};

    if (
        snakeX < 0 || snakeX >= 400 ||
        snakeY < 0 || snakeY >= 400 ||
        snake.some(segment => segment.x === snakeX && segment.y === snakeY)
    ) {
        clearInterval(game);
        return;
    }

    snake.unshift(newHead);
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        e.preventDefault();
        initGame();
        return;
    }
    if ((e.key === "ArrowLeft" || e.key === "a") && direction !== "RIGHT") direction = "LEFT";
    if ((e.key === "ArrowUp" || e.key === "w") && direction !== "DOWN") direction = "UP";
    if ((e.key === "ArrowRight" || e.key === "d") && direction !== "LEFT") direction = "RIGHT";
    if ((e.key === "ArrowDown" || e.key === "s") && direction !== "UP") direction = "DOWN";
});

document.getElementById("restartBtn").addEventListener("click", initGame);

initGame();
</script>

</body>
