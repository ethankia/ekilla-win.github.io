<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EK Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-container {
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .form-input { background: #2d2d2d; border: 1px solid #404040; transition: all 0.3s ease; }
        .form-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            outline: none;
        }
        .glow-text { text-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        .hover-lift { transition: transform 0.3s ease; }
        .hover-lift:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<nav class="fixed top-0 w-full bg-gray-900/80 backdrop-blur-md z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <h1 class="text-xl font-bold code-font gradient-text">EK Development</h1>
        </div>
    </div>
</nav>

<section class="pt-24 pb-12 bg-gradient-to-br from-gray-900 via-purple-900/20 to-blue-900/20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <h1 class="text-5xl md:text-6xl font-bold mb-6 glow-text">Get In Touch</h1>
        <p class="text-xl text-gray-300 mb-8">Ready to start your project? Let's discuss your requirements</p>
    </div>
</section>

<section class="py-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid md:grid-cols-2 gap-12">

            <!-- Contact Form -->
            <div class="form-container rounded-xl p-8">
                <h2 class="text-3xl font-bold mb-6 gradient-text">Project Inquiry</h2>
                <form class="space-y-6">
                    <input type="text" placeholder="Your full name" required
                        class="w-full px-4 py-3 rounded-lg form-input text-white placeholder-gray-400">
                    <textarea rows="4"
                        class="w-full px-4 py-3 rounded-lg form-input text-white placeholder-gray-400"
                        placeholder="Tell me more about your project..."></textarea>
                    <button type="submit"
                        class="w-full bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift">
                        Send Message
                    </button>
                </form>
            </div>

            <!-- Updated Alternative Contact -->
            <div class="space-y-8">
                <div>
                    <h3 class="text-2xl font-bold mb-4 gradient-text">Alternative Contact</h3>
                    <p class="text-gray-300 mb-6">Prefer direct contact? Reach out below.</p>

                    <div class="flex flex-col gap-4">

                        <!-- Discord -->
                        <a href="https://discord.gg/ajabWB9GEe" target="_blank"
                           class="inline-flex items-center bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift">
                            Join Discord Server
                        </a>

                        <!-- Email -->
                        <a href="mailto:ethankia1619@gmail.com"
                           class="inline-flex items-center bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift">
                            Email: ethankia1619@gmail.com
                        </a>

                        <!-- SMS -->
                        <a href="sms:6163870268?body=SITE%20(Do%20not%20change%20anything%20in%20this%20message)"
                           class="inline-flex items-center bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift">
                            Text 616-387-0268
                        </a>

                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<footer class="bg-gray-900 border-t border-gray-800 py-8">
    <div class="text-center">
        <p class="text-gray-400 code-font">
            © 2026 EK Development. All rights reserved.
        </p>
    </div>
</footer>

</body>
</html>
